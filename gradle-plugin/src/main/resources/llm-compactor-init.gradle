// Gradle Init Script for LLM Compactor - Silent mode
// This script suppresses Gradle's test output. The Java plugin emits the summary.

import org.gradle.api.tasks.testing.Test
import org.gradle.api.logging.LogLevel

// Check if llmCompactor is disabled via command-line property (-D or -P)
def sysProp = System.getProperty('llmCompactor.enabled')
def projProp = gradle.startParameter.projectProperties['llmCompactor.enabled']
def isCompactorEnabled = (sysProp ?: projProp ?: 'true').toBoolean()

if (isCompactorEnabled) {
    // Set quiet log level from the start
    gradle.startParameter.logLevel = LogLevel.QUIET
    gradle.startParameter.consoleOutput = ConsoleOutput.Plain
    gradle.startParameter.showStacktrace = ShowStacktrace.INTERNAL_EXCEPTIONS

    System.setProperty("org.gradle.welcome", "never")
    System.setProperty("org.gradle.internal.launcher.welcomeMessageEnabled", "false")

    // Configure ALL test tasks before they run
    gradle.taskGraph.whenReady { graph ->
        graph.allTasks.each { task ->
            if (task instanceof Test) {
                // Configure test logging to suppress everything
                task.testLogging {
                    events = []
                    showStandardStreams = false
                    showExceptions = false
                    showCauses = false
                    showStackTraces = false
                    exceptionFormat = 'short'
                }
                
                // Disable Spock output
                task.systemProperty('spock.useColor', 'false')
                task.systemProperty('spock.filterByTestName', 'false')
                
                // Capture standard output/error at QUIET level
                task.logging.captureStandardOutput(LogLevel.QUIET)
                task.logging.captureStandardError(LogLevel.QUIET)
            }
        }
    }
} else {
    println "[LLM Compactor] Disabled via command-line property"
}
