import org.gradle.api.logging.LogLevel
import org.gradle.api.tasks.testing.Test

// This init script handles late build-scoped suppression only.
// Full Gradle quiet mode must be configured before the session starts,
// which the plugin now bootstraps via Gradle user-home gradle.properties.
gradle.allprojects {
    logging.captureStandardOutput(LogLevel.DEBUG)
    logging.captureStandardError(LogLevel.DEBUG)
    
    tasks.withType(Test).configureEach { Test t ->
        t.testLogging {
            events = []
            showStandardStreams = false
            showExceptions = false
            showCauses = false
            showStackTraces = false
        }
        
        t.addTestOutputListener(new org.gradle.api.tasks.testing.TestOutputListener() {
            void onOutput(TestDescriptor descriptor, org.gradle.api.tasks.testing.TestOutputEvent event) {
                // Swallow all stdout/stderr from tests
            }
        })
    }
}
