name: Java CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [8, 11, 17, 21, 25]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Build with Maven
        run: |
          if [ "${{ matrix.java }}" = "21" ]; then
            mvn clean install -Pquality -Dnvd.api.key=${{ secrets.NVD_API_KEY }} -ntp
          else
            mvn clean install -ntp
          fi

  integration-test:
    name: Integration Tests (Java 17)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gradle/wrapper/dists
          key: it-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            it-${{ runner.os }}-
            maven-${{ runner.os }}-

      - name: Install all modules to local Maven repo
        run: ./mvnw install -DskipTests -ntp --quiet

      - name: Run integration tests
        run: ./mvnw verify -Pintegration-tests -ntp

  smoke-test:
    name: Smoke Tests (Java 17)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gradle/wrapper/dists
          key: it-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            it-${{ runner.os }}-
            maven-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Run smoke tests
        run: ./mvnw install -Psmoke-tests -ntp
