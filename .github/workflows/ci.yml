name: Java CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [8, 11, 17, 21, 25]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Check version sync
        run: |
          pom_version=$(grep -m1 '<revision>' pom.xml | sed 's/.*<revision>\(.*\)<\/revision>.*/\1/')
          gradle_version=$(grep '^pluginVersion=' gradle.properties | cut -d= -f2)
          if [ "$pom_version" != "$gradle_version" ]; then
            echo "Version mismatch: pom.xml revision=$pom_version, gradle.properties pluginVersion=$gradle_version"
            exit 1
          fi

      - name: Build with Maven
        run: |
          if [ "${{ matrix.java }}" = "21" ]; then
            mvn clean install -Pquality
          else
            mvn clean install
          fi

  publish:
    name: Publish to GitHub Packages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Setup Maven settings.xml
        uses: whelk-io/maven-settings-xml-action@v22
        with:
          servers: '[{ "id": "github", "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}" }]'

      - name: Publish Maven modules to GitHub Packages
        run: ./mvnw deploy -Pgithub -DskipTests --quiet

      - name: Install core for Gradle plugin build
        run: ./mvnw install -pl core -am -DskipTests --quiet

      - name: Publish Gradle plugin to GitHub Packages
        run: cd gradle-plugin && ../gradlew-smart publishAllPublicationsToGithubRepository --no-daemon
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

