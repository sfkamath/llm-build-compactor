name: Java CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [8, 11, 17, 21, 25]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Build with Maven
        run: |
          if [ "${{ matrix.java }}" = "21" ]; then
            mvn clean install -Pquality -Dnvd.api.key=${{ secrets.NVD_API_KEY }} -ntp
          else
            mvn clean install -ntp
          fi

  integration-test:
    name: Integration Tests (Java 17)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gradle/wrapper/dists
          key: it-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            it-${{ runner.os }}-
            maven-${{ runner.os }}-

      - name: Install all modules to local Maven repo
        run: ./mvnw install -DskipTests -ntp --quiet

      - name: Run integration tests
        run: ./mvnw verify -Pintegration-tests -ntp

  publish:
    name: Publish to GitHub Packages
    needs: [build, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: ''

      - name: Setup Maven settings.xml
        uses: whelk-io/maven-settings-xml-action@v22
        with:
          servers: '[{ "id": "github", "username": "${{ github.actor }}", "password": "${{ secrets.GITHUB_TOKEN }}" }]'

      - name: Publish Maven modules to GitHub Packages
        run: ./mvnw deploy -Pgithub -Drevision=${{ steps.tag_version.outputs.new_tag }} -DskipTests -ntp --quiet

      - name: Install core for Gradle plugin build
        run: ./mvnw install -pl core -am -Drevision=${{ steps.tag_version.outputs.new_tag }} -DskipTests -ntp --quiet

      - name: Publish Gradle plugin to GitHub Packages
        run: |
          cd gradle-plugin && ../gradlew-smart publishAllPublicationsToGithubRepository -PpluginVersion=${{ steps.tag_version.outputs.new_tag }} --no-daemon -q --console=plain
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      version: ${{ steps.tag_version.outputs.new_tag }}

